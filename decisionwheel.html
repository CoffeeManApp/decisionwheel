<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Cute Decision Wheel ✨</title>
    <style>
        :root {
            --bg-color: #eef5ff;
            --card-bg: #ffffff;
            --primary: #4ba3ff;
            --primary-dark: #257ce1;
            --accent: #ff76a0; /* Cute pink accent for highlights */
            --text-color: #2d3748;
            --wheel-border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Nuito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#cbdff7 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .game-card {
            max-width: 450px;
            width: 100%;
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 32px;
            border: 4px solid var(--wheel-border);
            box-shadow: 0 12px 0 var(--wheel-border);
            text-align: center;
            position: relative;
            transform: translateY(0);
            transition: transform 0.2s;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--primary-dark);
            text-shadow: 2px 2px 0px #cbdff7;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* Input Controls */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border: 3px solid var(--wheel-border);
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            box-shadow: inset 0 -4px 0 #edf2f7;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        /* Cute Bubbly Buttons */
        .btn {
            background-color: var(--primary);
            color: white;
            border: 3px solid var(--wheel-border);
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--wheel-border);
            transition: all 0.1s ease;
        }

        .btn:hover {
            background-color: #60b0ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 var(--wheel-border);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--wheel-border);
        }

        /* Item Tags */
        .item-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 2rem;
            justify-content: center;
            min-height: 34px;
        }

        .item-tag {
            background-color: #e6f2ff;
            color: var(--primary-dark);
            border: 2px solid var(--wheel-border);
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .item-tag span {
            cursor: pointer;
            font-weight: bold;
            color: var(--accent);
            transition: transform 0.1s;
        }

        .item-tag span:hover {
            transform: scale(1.3);
        }

        /* Wheel Area */
        .wheel-container {
            position: relative;
            width: 310px;
            height: 310px;
            margin: 0 auto 2.5rem auto;
        }

        .wheel-outer-border {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid var(--wheel-border);
            box-shadow: 0 8px 0 var(--wheel-border);
            overflow: hidden;
            background: #fff;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4.5s cubic-bezier(0.25, 0.1, 0.1, 1);
        }

        /* Cute Pointer */
        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 34px;
            height: 38px;
            background: var(--accent);
            border: 4px solid var(--wheel-border);
            border-radius: 8px 8px 50% 50%;
            z-index: 10;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        /* Center Peg */
        .center-peg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background: #ffffff;
            border: 4px solid var(--wheel-border);
            border-radius: 50%;
            z-index: 5;
        }

        /* Big Spin Button */
        .spin-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            background-color: var(--accent);
            box-shadow: 0 6px 0 var(--wheel-border);
        }
        .spin-btn:hover {
            background-color: #ff8fae;
            box-shadow: 0 8px 0 var(--wheel-border);
        }
        .spin-btn:active {
            box-shadow: 0 0px 0 var(--wheel-border);
        }

        /* Result Popup */
        .result-display {
            margin-top: 1.5rem;
            min-height: 40px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-color);
        }

        .bounce-anim {
            animation: bounce 0.5s ease infinite alternate;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>✨ Decision Wheel ✨</h1>
        
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Add cute option... 🍰" max-length="15" onkeypress="handleKeyPress(event)">
            <button class="btn" onclick="addItem()">Add</button>
        </div>

        <div class="item-list" id="itemList"></div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="center-peg"></div>
            <div class="wheel-outer-border">
                <canvas id="wheelCanvas" width="450" height="450"></canvas>
            </div>
        </div>

        <button class="btn spin-btn" onclick="spinWheel()">🎉 SPIN! 🎉</button>

        <div class="result-display" id="resultDisplay"></div>
    </div>

    <script>
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const input = document.getElementById("itemInput");
        const itemListDiv = document.getElementById("itemList");
        const resultDisplay = document.getElementById("resultDisplay");

        // Soft pastel game-like palette
        const colors = [
            "#ffccd5", "#ffe3e3", "#d8f3dc", "#b7e4c7", 
            "#c7e2fe", "#e2eefe", "#fde2e4", "#fff1e6"
        ];

        // LOCAL STORAGE: Load items or set fun defaults if empty
        let items = JSON.parse(localStorage.getItem("cuteWheelItems")) || ["Bobalove 🧋", "Sleep 💤", "Gaming 🎮", "Cake 🍰"];
        let currentRotation = 0;
        let isSpinning = false;

        function saveToStorage() {
            localStorage.setItem("cuteWheelItems", JSON.stringify(items));
        }

        function renderItems() {
            itemListDiv.innerHTML = "";
            items.forEach((item, index) => {
                const tag = document.createElement("div");
                tag.className = "item-tag";
                tag.innerHTML = `${item} <span onclick="removeItem(${index})">×</span>`;
                itemListDiv.appendChild(tag);
            });
            saveToStorage();
            drawWheel();
        }

        function addItem() {
            const val = input.value.trim();
            if (val) {
                items.push(val);
                input.value = "";
                renderItems();
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') addItem();
        }

        function removeItem(index) {
            items.splice(index, 1);
            renderItems();
        }

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (items.length === 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = "#f7fafc";
                ctx.fill();
                return;
            }

            const arc = (2 * Math.PI) / items.length;

            items.forEach((item, i) => {
                const angle = i * arc;
                
                // Draw Slices
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                
                // Slice Border lines
                ctx.strokeStyle = "#334155";
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.save();

                // Draw Text / Emojis
                ctx.translate(
                    centerX + Math.cos(angle + arc / 2) * (radius * 0.62),
                    centerY + Math.sin(angle + arc / 2) * (radius * 0.62)
                );
                ctx.rotate(angle + arc / 2);
                
                ctx.fillStyle = "#2d3748";
                ctx.font = "bold 22px -apple-system, sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // Truncate text if too long to fit beautifully
                let cleanText = item.length > 10 ? item.substring(0, 9) + "..." : item;
                ctx.fillText(cleanText, 0, 0);
                
                ctx.restore();
            });
        }

        function spinWheel() {
            if (isSpinning || items.length === 0) return;
            isSpinning = true;
            resultDisplay.textContent = "";
            resultDisplay.classList.remove("bounce-anim");

            const spins = Math.floor(Math.random() * 4) + 6; // 6 to 10 full spins
            const degrees = Math.floor(Math.random() * 360);
            
            currentRotation += (spins * 360) + degrees;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                
                const actualRotation = currentRotation % 360;
                const sliceAngle = 360 / items.length;
                
                // Math logic aligns with the top canvas pointer point
                const winningIndex = Math.floor((360 - actualRotation + 270) % 360 / sliceAngle);
                
                resultDisplay.textContent = `⭐ ${items[winningIndex]} ⭐`;
                resultDisplay.classList.add("bounce-anim");
            }, 4500);
        }

        // Run on initial load
        renderItems();
    </script>
</body>
</html>
